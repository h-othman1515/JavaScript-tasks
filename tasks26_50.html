    <script>
        // task 26
        // Write a program that prints numbers between 1 and 500 where the reverse of the number is also divisible by 3.
        console.log("------------ Task 26 ------------");
        reversed = [];
        for (let i = 1; i <= 500; i++) {
            let num = i;
            let reverse = 0;
            while (num > 0) {
                reverse = reverse * 10 + num % 10;
                num = Math.floor(num / 10);
            }
            if (reverse % 3 === 0) {
                reversed.push(i);
            }
        }
        console.log("Total revered numbers:", reversed.length);
        console.log(reversed);

        // task 27
        // Write a program that prints numbers between 1 and 200 where the difference between digits equals 2.
        console.log("------------ Task 27 ------------");
        difference = [];
        for (let i = 10; i <= 200; i++) {
            let Units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100);

            if (i < 100) {
                if (Math.abs(tens - Units) == 2) {
                    difference.push(i);
                }
            }
            else {
                if (Math.abs(hundreds - tens) == 2 && Math.abs(tens - Units) == 2) {
                    difference.push(i);
                }
            }
        }
        console.log(difference);

        // task 28
        // Write a program that prints numbers between 1 and 500 whose digits are in ascending order.
        console.log("------------ Task 28 ------------");
        for (let i = 1; i <= 500; i++) {
            let number = String(i);
            let firstDigit = Number(number[0]);
            let lastDigit = Number(number[number.length - 1]);

            if (firstDigit < lastDigit) {
                console.log("number (" + i + "): the first digit (" + firstDigit + ") is less than the last digit (" + lastDigit + ")");
            }
        }

        // task 29
        // Write a program that prints numbers between 1 and 500 whose digits are in descending order.
        console.log("------------ Task 29 ------------");
        for (let i = 1; i <= 500; i++) {
            let number = String(i);
            let firstDigit = Number(number[0]);
            let lastDigit = Number(number[number.length - 1]);

            if (firstDigit > lastDigit) {
                console.log("number (" + i + "): the first digit (" + firstDigit + ") is greater than the last digit (" + lastDigit + ")");
            }
        }

        // task 30
        // Write a program that prints numbers between 1 and 300 where the last digit equals the sum of the other digits.
        console.log("------------ Task 30 ------------");
        equals = [];
        for (let i = 1; i <= 300; i++) {
            let number = String(i); // i = 100 | i = 123
            let lastDigit = Number(number[number.length - 1]); // lastDigit = 0 | lastDigit = 3
            let sum = 0;

            for (let j = 0; j < number.length - 1; j++) { // j = 0 | j = 0, 1 ,2 , number.length - 1 = 2
                sum += Number(number[j]); // sum = sum + number[j] = 0 + 1 = 1 | 1st iteration: sum = 0 + 1 = 1 => 2nd iteration: sum = 1 + 2 = 3
            }

            if (sum === lastDigit) { // sum = 1 == lasrDigit = 0? : false [skip] | sum == lastDigit? ,3 == 3? : true [print] 
                equals.push(i); // i = 123
            }
        }
        console.log(equals);

        // task 31
        // Write a program that prints numbers between 1 and 200 where the sum of digits is greater than 10.
        console.log("------------ Task 31 ------------");
        let greaterThan10 = [];
        for (let i = 10; i <= 200; i++) {
            let Units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100);

            if (hundreds + tens + Units > 10) {
                greaterThan10.push(i);
            }
        }
        console.log(greaterThan10);

        // task 32
        // Write a program that prints numbers between 1 and 500 whose digit sum is a prime number.
        console.log("------------ Task 32 ------------");
        let prime = [];
        for (let i = 10; i <= 500; i++) {
            let Units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100);

            let sum = hundreds + tens + Units;
            let isPrime = true;
            if (sum < 2) {
                isPrime = false;
            } else {
                for (let j = 2; j <= Math.sqrt(sum); j++) {
                    if (sum % j === 0) {
                        isPrime = false;
                        break;
                    }
                }
            }

            if (isPrime) {
                prime.push(i);
            }
        }
        console.log(prime);

        // task 33
        // Write a program that prints numbers between 1 and 300 that contain exactly two digits equal to each other.
        console.log("------------ Task 33 ------------");
        TwoDigits = [];
        for (let i = 1; i <= 300; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100);

            if (units == 0 && hundreds == 0) {
                continue;
            } else if (units == 0 && tens == 0) {
                continue;
            }
            else if (tens == 0 && hundreds == 0) {
                continue;
            }
            else {
                if (units == tens && tens != hundreds) {
                    TwoDigits.push(i);
                } else if (units == hundreds && hundreds != tens) {
                    TwoDigits.push(i);
                } else if (tens == hundreds && hundreds != units) {
                    TwoDigits.push(i);
                }
            }
        }
        console.log(TwoDigits);

        // task 34
        // Write a program that prints numbers between 1 and 200 where the reverse of the number is greater than the original number.
        console.log("------------ Task 34 ------------");
        for (let i = 1; i <= 200; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100);

            let rev;
            if (i < 10) {
                rev = units;
            } else if (i < 100) {
                rev = units * 10 + tens;
            } else {
                rev = units * 100 + tens * 10 + hundreds;
            }

            if (rev > i) console.log(i);
        }

        // task 35
        // Write a program that prints numbers between 1 and 500 whose digit product is divisible by 5.
        console.log("------------ Task 35 ------------");
        for (let i = 1; i <= 500; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100);

            let product;
            if (i < 10) {
                product = units;
            } else if (i < 100) {
                product = units * tens;
            } else {
                product = units * tens * hundreds;
            }

            if (product !== 0 && product % 5 === 0) console.log(i);
        }

        // task 36
        // Write a program that prints numbers between 1 and 300 where the sum of digits equals the number of digits multiplied by 5.
        console.log("------------ Task 36 ------------");
        for (let i = 1; i <= 300; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100);

            let sum;
            let numDigits;
            if (i < 10) {
                sum = units; numDigits = 1;
            } else if (i < 100) {
                sum = units + tens; numDigits = 2;
            } else {
                sum = units + tens + hundreds; numDigits = 3;
            }

            if (sum === numDigits * 5){
                console.log(i);}
        }

        // task 37
        // Write a program that prints numbers between 1 and 500 whose reverse number is even.
        console.log("------------ Task 37 ------------");
        for (let i = 1; i <= 500; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100);

            let rev;
            if (i < 10) {
                rev = units;
            } else if (i < 100) {
                rev = units * 10 + tens;
            } else {
                rev = units * 100 + tens * 10 + hundreds;
            }

            if (rev % 2 === 0) {
                console.log(i);
            }
        }

        // task 38
        // Write a program that prints numbers between 1 and 300 where the square of the last digit equals the first digit.
        console.log("------------ Task 38 ------------");
        for (let i = 1; i <= 300; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100);

            let first;
            if (i < 10) {
                first = units;
            } else if (i < 100) {
                first = tens;
            } else {
                first = hundreds;
            }

            if (units * units === first) {
                console.log(i);
            }
        }

        // task 39
        // Write a program that prints numbers between 1 and 500 whose digit sum is divisible by the number of digits.
        console.log("------------ Task 39 ------------");
        for (let i = 1; i <= 500; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100);

            let sum;
            let numDigits;
            if (i < 10) {
                sum = units; numDigits = 1;
            } else if (i < 100) {
                sum = units + tens; numDigits = 2;
            } else {
                sum = units + tens + hundreds; numDigits = 3;
            }

            if (sum % numDigits === 0) {
                console.log(i);
            }
        }

        // task 40
        // Write a program that prints numbers between 1 and 1000 where the sum of digits equals 15.
        console.log("------------ Task 40 ------------");
        for (let i = 1; i <= 1000; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100) % 10;
            let thousands = Math.floor(i / 1000);

            let sum = units + tens + hundreds + thousands;

            if (sum === 15) {
                console.log(i);
            }
        }

        // task 41
        // Write a program that prints numbers between 1 and 1000 whose digit sum equals their digit product.
        console.log("------------ Task 41 ------------");
        for (let i = 1; i <= 1000; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100) % 10;
            let thousands = Math.floor(i / 1000);

            let sum;
            let product;
            if (i < 10) {
                sum = units; product = units;
            } else if (i < 100) {
                sum = units + tens; product = units * tens;
            } else if (i < 1000) {
                sum = units + tens + hundreds; product = units * tens * hundreds;
            } else {
                sum = units + tens + hundreds + thousands;
                product = units * tens * hundreds * thousands;
            }

            if (sum === product) console.log(i);
        }

        // task 42
        // Write a program that prints numbers between 1 and 1000 whose reverse equals the original number plus 9.
        console.log("------------ Task 42 ------------");
        for (let i = 1; i <= 1000; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100) % 10;
            let thousands = Math.floor(i / 1000);

            let rev;
            if (i < 10) {
                rev = units;
            } else if (i < 100) {
                rev = units * 10 + tens;
            } else if (i < 1000) {
                rev = units * 100 + tens * 10 + hundreds;
            } else {
                rev = units * 1000 + tens * 100 + hundreds * 10 + thousands;
            }

            if (rev === i + 9) console.log(i);
        }

        // Task 43
        // Write a program that prints numbers between 1 and 1000 whose square ends with the same number.
        console.log("------------ Task 43 ------------");
        for (let i = 1; i <= 1000; i++) {
            let units = i % 10;
            if ((i * i) % 10 === units) console.log(i);
        }

        // task 44
        // Write a program that prints numbers between 1 and 1000 where the difference between the number and its reverse is divisible by 9.
        console.log("------------ Task 44 ------------");
        for (let i = 1; i <= 1000; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100) % 10;
            let thousands = Math.floor(i / 1000);

            let rev;
            if (i < 10) {
                rev = units;
            } else if (i < 100) {
                rev = units * 10 + tens;
            } else if (i < 1000) {
                rev = units * 100 + tens * 10 + hundreds;
            } else {
                rev = units * 1000 + tens * 100 + hundreds * 10 + thousands;
            }

            if (Math.abs(i - rev) % 9 === 0) console.log(i);
        }

        // task 45
        // Write a program that prints numbers between 1 and 1000 where the sum of digits equals the reverse of the number of digits.
        console.log("------------ Task 45 ------------");
        for (let i = 1; i <= 1000; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100) % 10;
            let thousands = Math.floor(i / 1000);

            let sum;
            let numDigits;
            if (i < 10) {
                sum = units; numDigits = 1;
            } else if (i < 100) {
                sum = units + tens; numDigits = 2;
            } else if (i < 1000) {
                sum = units + tens + hundreds; numDigits = 3;
            } else {
                sum = units + tens + hundreds + thousands; numDigits = 4;
            }

            let revLen = parseInt(numDigits.toString().split('').reverse().join(''));

            if (sum === revLen) console.log(i);
        }

        // task 46
        // Write a program that prints numbers between 1 and 1000 where the digit sum squared equals the number.
        console.log("------------ Task 46 ------------");
        for (let i = 1; i <= 1000; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100) % 10;
            let thousands = Math.floor(i / 1000);

            let sum = units + tens + hundreds + thousands;

            if (sum * sum === i) console.log(i);
        }

        // task 47
        // Write a program that prints numbers between 1 and 1000 where the sum of the cubes of the digits equals the number.
        console.log("------------ Task 47 ------------");
        for (let i = 1; i <= 1000; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100) % 10;
            let thousands = Math.floor(i / 1000);

            let cubeSum = units * units * units + tens * tens * tens +
                hundreds * hundreds * hundreds + thousands * thousands * thousands;

            if (cubeSum === i) console.log(i);
        }

        // task 48
        // Write a program that prints numbers between 1 and 1000 where the reverse number is a prime number.
        console.log("------------ Task 48 ------------");
        for (let i = 1; i <= 1000; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100) % 10;
            let thousands = Math.floor(i / 1000);

            let rev;
            if (i < 10) {
                rev = units;
            } else if (i < 100) {
                rev = units * 10 + tens;
            } else if (i < 1000) {
                rev = units * 100 + tens * 10 + hundreds;
            } else {
                rev = units * 1000 + tens * 100 + hundreds * 10 + thousands;
            }

            let isPrime = rev > 1;
            for (let j = 2; j <= Math.sqrt(rev); j++) {
                if (rev % j === 0) { isPrime = false; break; }
            }

            if (isPrime) console.log(i);
        }

        // task 49
        // Write a program that prints numbers between 1 and 1000 where the product of digits equals the square of the digit sum.
        console.log("------------ Task 49 ------------");
        for (let i = 1; i <= 1000; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100) % 10;
            let thousands = Math.floor(i / 1000);

            let sum;
            let product;
            if (i < 10) {
                sum = units; product = units;
            } else if (i < 100) {
                sum = units + tens; product = units * tens;
            } else if (i < 1000) {
                sum = units + tens + hundreds; product = units * tens * hundreds;
            } else {
                sum = units + tens + hundreds + thousands;
                product = units * tens * hundreds * thousands;
            }

            if (product === sum * sum) console.log(i);
        }

        // task 50
        // Write a program that prints numbers between 1 and 1000 where the reverse of the number multiplied by the original number ends with 1.
        console.log("------------ Task 50 ------------");
        for (let i = 1; i <= 1000; i++) {
            let units = i % 10;
            let tens = Math.floor(i / 10) % 10;
            let hundreds = Math.floor(i / 100) % 10;
            let thousands = Math.floor(i / 1000);

            let rev;
            if (i < 10) {
                rev = units;
            } else if (i < 100) {
                rev = units * 10 + tens;
            } else if (i < 1000) {
                rev = units * 100 + tens * 10 + hundreds;
            } else {
                rev = units * 1000 + tens * 100 + hundreds * 10 + thousands;
            }

            if ((rev * i) % 10 === 1) console.log(i);
        }
