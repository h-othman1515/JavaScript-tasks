    <script>
        // Task 21 : Check for Anagrams
        // Check if the following two words are anagrams (contain the same letters).
        console.log("------------ Task 21 ------------");
        let word1 = "listen";
        let word2 = "silent";
        console.log("Does the words " + word1 + " and " + word2 + " form an anagram? " + (word1.split("").sort().join("") === word2.split("").sort().join("")));

        // Task 22 : Reverse Words in Sentence
        // Reverse the order of words in the sentence but keep the letters of each word unchanged.
        console.log("------------ Task 22 ------------");
        let sentence = "The quick brown fox";
        console.log(sentence.split(" ").reverse().join(" "));

        // Task 23 :  Find the Longest Word
        // Find the longest word in the following sentence.
        console.log("------------ Task 23 ------------");
        let sentence23 = "The quick brown fox jumps over the lazy dog";
        let longestWord23 = sentence23.split(" ").sort((a, b) => b.length - a.length)[0];
        console.log(longestWord23);

        // Task 24 : Advanced Palindrome
        // Check if the sentence is a palindrome ignoring spaces, punctuation, and case.
        console.log("------------ Task 24 ------------");
        let input = "A man, a plan, a canal, Panama!";
        let cleaned = "";
        for (let i = 0; i < input.length; i++) {
            let char = input[i].toLowerCase();
            if (char >= "a" && char <= "z") {
                cleaned += char;
            }
        }
        let reversed = cleaned.split("").reverse().join("");
        if (cleaned === reversed) {
            console.log("Palindrome");
        } else {
            console.log("Not a Palindrome");
        }

        // Task 25 : Character Frequency
        // Return an object that counts how many times each character appears.
        console.log("------------ Task 25 ------------");
        let word = "mississippi";
        let frequency = {};
        for (let i = 0; i < word.length; i++) {
            let char = word[i];
            if (frequency[char]) {
                frequency[char]++;
            } else {
                frequency[char] = 1;
            }
        }
        console.log(frequency);
